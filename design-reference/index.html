  <link rel="stylesheet" href="five01/styles.css?v=31" />
  <style>
    html, body, #root { height: 100%; }
    body {
      background: #050505;
      color: #f6f1e7;
      font-family: "Geist", system-ui, sans-serif;
      overflow-x: hidden;
    }
    /* Page-app overrides so .main can scroll vertically when content overflows */
    .shell { height: calc(100vh - 49px - 30px); /* topbar + footer approximate */ }
    .main { overflow-y: auto; }
  </style>
  <script>
    // Suppress "ResizeObserver loop completed with undelivered notifications" —
    // benign browser warning emitted when a ResizeObserver callback triggers
    // another resize within the same frame. Doesn't indicate a real problem;
    // pollutes the console and gates the verifier unnecessarily.
    window.addEventListener("error", (e) => {
      if (e.message && /ResizeObserver loop/i.test(e.message)) {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    });
  </script>
</head>
