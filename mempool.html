<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>xmr.irish — Monero Mempool Explorer</title>
<meta name="description" content="Real-time Monero mempool — fee tiers, projected block, transaction flow, live depth chart. Privacy by default.">
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&family=DM+Mono:wght@300;400;500&family=Geologica:wght@100..900&family=Sora:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/d10.css">
<style>
/* Prevent hidden-panel flash before d10.css applies. */
.mp-mode-panel[hidden]{display:none}

/* ═══════════════════════════════════════════════════════════════
   Mempool 3.0 OCEAN mode — M2 styles (prefix .mp-*)
   ═══════════════════════════════════════════════════════════════ */
.mp{min-height:100vh}
.mp,.mp *{font-family:var(--font-mono,'DM Mono'),monospace}
.mp .nav,.mp .nav *{font-family:var(--font-body)}
.mp .nav .nav-logo{font-family:var(--font-headline)}
.mp .nav .nb-val,.mp .nav .np .val{font-family:var(--font-data)}

/* Sub-nav: brand / mode tabs / connection indicator */
.mp-subnav{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:10px var(--space-page-x);
    border-bottom:1px solid var(--border-subtle);
    background:var(--surface-0);
}
.mp-brand{font-size:12px;color:var(--text-tertiary);letter-spacing:1px;text-transform:uppercase}
.mp-brand b{color:var(--xmr);font-weight:600}
.mp-modes{display:flex;gap:4px}
.mp-mode-btn{
    background:transparent;border:1px solid var(--border-subtle);
    color:var(--text-tertiary);font-size:10.5px;font-weight:600;
    letter-spacing:1.2px;padding:6px 14px;border-radius:6px;cursor:pointer;
    font-family:inherit;transition:color .15s,border-color .15s,background .15s;
}
.mp-mode-btn:hover{color:var(--text-secondary);border-color:var(--border-default)}
.mp-mode-btn.active{
    background:rgba(255,102,0,.08);border-color:rgba(255,102,0,.28);
    color:var(--xmr);
}
.mp-conn-status{
    margin-left:auto;display:flex;align-items:center;gap:7px;
    font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--text-tertiary);
}
.mp-conn-status .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);transition:background .2s}
.mp-conn-status.live .dot{background:var(--grn);box-shadow:0 0 8px var(--grn);animation:mp-pulse 1.8s ease-in-out infinite}
.mp-conn-status.live .label{color:var(--grn)}
.mp-conn-status.connecting .dot{background:var(--gold)}
.mp-conn-status.connecting .label{color:var(--gold)}
.mp-conn-status.offline .dot{background:var(--red)}
.mp-conn-status.offline .label{color:var(--red)}
@keyframes mp-pulse{0%,100%{opacity:1}50%{opacity:.5}}
@media(prefers-reduced-motion:reduce){
    .mp-conn-status.live .dot{animation:none}
}

/* Mode panels */
.mp-mode-panel{padding:18px var(--space-page-x) 32px}
.mp-placeholder{
    min-height:240px;display:flex;align-items:center;justify-content:center;
    border:1px dashed var(--border-subtle);border-radius:12px;
    color:var(--text-tertiary);font-size:12px;letter-spacing:1.5px;
    text-transform:uppercase;
}

/* Fee hero cards (4) */
.mp-fee-hero{
    display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;
}
.mp-fee-card{
    background:var(--surface-1);border:1px solid var(--border-subtle);
    border-top:3px solid #888;border-radius:10px;padding:14px 16px;
    transition:transform .15s,border-color .15s;
}
.mp-fee-card:hover{transform:translateY(-1px)}
.mp-fee-card-label{font-size:10px;font-weight:700;letter-spacing:1.6px;margin-bottom:6px}
.mp-fee-card-rate{display:flex;align-items:baseline;gap:5px;margin-bottom:4px}
.mp-fee-rate-val{font-size:22px;font-weight:600;color:var(--text-primary)}
.mp-fee-rate-unit{font-size:11px;color:var(--text-tertiary);letter-spacing:1px}
.mp-fee-card-eta{font-size:10px;color:var(--text-muted);letter-spacing:1.2px;text-transform:uppercase}

/* Projected block strip */
.mp-proj-block{
    background:var(--surface-1);border:1px solid var(--border-subtle);
    border-radius:10px;padding:12px 16px;margin-bottom:14px;
}
.mp-proj-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.mp-proj-label{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-tertiary)}
.mp-proj-eta{font-size:11px;color:var(--xmr);letter-spacing:1px}
.mp-proj-bar{
    height:18px;background:var(--surface-2);border-radius:5px;
    overflow:hidden;position:relative;margin-bottom:6px;
}
.mp-proj-fill{display:flex;height:100%}
.mp-proj-seg{display:block;height:100%}
.mp-proj-seg:first-child{border-radius:5px 0 0 5px}
.mp-proj-seg:last-child{border-radius:0 5px 5px 0}
.mp-proj-pct{font-size:12px;color:var(--text-secondary);margin-bottom:4px}
.mp-proj-meta{font-size:10.5px;color:var(--text-muted);letter-spacing:.4px}

/* Ocean canvas */
.mp-ocean{
    position:relative;background:var(--surface-1);
    border:1px solid var(--border-subtle);border-radius:10px;
    height:340px;margin-bottom:14px;overflow:hidden;
}
.mp-ocean canvas{width:100%;height:100%;display:block}
.mp-ocean-tip{
    position:absolute;top:0;left:0;width:200px;pointer-events:none;
    background:rgba(10,10,14,.94);border:1px solid var(--border-default);
    border-radius:8px;padding:8px 10px;font-size:10.5px;
    box-shadow:0 6px 24px rgba(0,0,0,.4);z-index:5;
}
.mp-tt-row{display:flex;justify-content:space-between;gap:10px;padding:1px 0;color:var(--text-tertiary)}
.mp-tt-row b{color:var(--text-primary);font-weight:500}
.mp-tt-tier{font-size:9px;font-weight:700;letter-spacing:1.6px;margin-top:4px;text-transform:uppercase}

/* Fee depth chart */
.mp-depth{
    background:var(--surface-1);border:1px solid var(--border-subtle);
    border-radius:10px;padding:10px;height:260px;margin-bottom:14px;
}
.mp-depth-head{
    display:flex;justify-content:space-between;margin-bottom:4px;
    font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-tertiary);
}
.mp-depth canvas{width:100%;height:calc(100% - 18px);display:block}

/* Live TX feed */
.mp-txfeed{
    background:var(--surface-1);border:1px solid var(--border-subtle);
    border-radius:10px;padding:10px 12px;margin-bottom:14px;
}
.mp-txfeed-h{
    display:grid;grid-template-columns:1.4fr .7fr 1fr .55fr .9fr .55fr;
    gap:10px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--text-muted);padding:4px 6px;border-bottom:1px solid var(--border-subtle);
}
.mp-txfeed-list{max-height:320px;overflow:hidden}
.mp-txrow{
    display:grid;grid-template-columns:1.4fr .7fr 1fr .55fr .9fr .55fr;
    gap:10px;font-size:11px;padding:6px;border-bottom:1px solid rgba(255,255,255,.02);
    cursor:pointer;transition:background .12s;
}
.mp-txrow:hover{background:rgba(255,255,255,.02)}
.mp-txrow .c-txid{color:var(--blue)}
.mp-txrow .c-size,.mp-txrow .c-fee,.mp-txrow .c-rate,.mp-txrow .c-age{color:var(--text-secondary)}
.mp-txrow .c-tier{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:1.3px;color:var(--text-tertiary);text-transform:uppercase}
.mp-tier-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
@keyframes mp-slide-in{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.mp-txrow-in{animation:mp-slide-in .32s ease-out}
@media(prefers-reduced-motion:reduce){.mp-txrow-in{animation:none}}

/* Stats row (chips) */
.mp-stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.mp-stat-chip{
    background:var(--surface-1);border:1px solid var(--border-subtle);
    border-radius:8px;padding:10px 12px;text-align:center;
}
.mp-stat-v{font-size:14px;font-weight:600;color:var(--text-primary)}
.mp-stat-l{font-size:8.5px;color:var(--text-muted);letter-spacing:1.6px;text-transform:uppercase;margin-top:3px}

/* Responsive */
@media(max-width:900px){
    .mp-fee-hero{grid-template-columns:repeat(2,1fr)}
    .mp-stats-row{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:560px){
    .mp-subnav{gap:8px;padding:8px 14px}
    .mp-mode-btn{padding:5px 9px;font-size:9.5px;letter-spacing:1px}
    .mp-conn-status{font-size:9px;margin-left:0;width:100%;justify-content:flex-start;border-top:1px solid var(--border-subtle);padding-top:6px}
    .mp-stats-row{grid-template-columns:repeat(2,1fr)}
    .mp-txfeed-h,.mp-txrow{grid-template-columns:1.3fr .6fr 1fr .55fr}
    .mp-txfeed-h .c-tier,.mp-txrow .c-tier,
    .mp-txfeed-h .c-age,.mp-txrow .c-age{display:none}
    .mp-ocean{height:260px}
    .mp-depth{height:220px}
}
</style>
</head>
<body>
<div class="page-offset mp">

    <div id="nav-mount"></div>

    <div class="mp-subnav">
        <div class="mp-brand"><b>xmr.irish</b> &nbsp;/&nbsp; mempool</div>
        <div class="mp-modes" role="tablist" aria-label="Mempool modes">
            <button class="mp-mode-btn active" data-mode="ocean"    role="tab" aria-selected="true">OCEAN</button>
            <button class="mp-mode-btn"        data-mode="explorer" role="tab" aria-selected="false">EXPLORER</button>
            <button class="mp-mode-btn"        data-mode="mining"   role="tab" aria-selected="false">MINING</button>
        </div>
        <div class="mp-conn-status connecting" id="mp-conn" aria-live="polite">
            <span class="dot"></span><span class="label">CONNECTING</span>
        </div>
    </div>

    <!-- OCEAN MODE ───────────────────────────────────────────────── -->
    <section class="mp-mode-panel" id="mp-panel-ocean" data-mode="ocean" role="tabpanel">
        <div class="mp-fee-hero" id="mp-fee-hero"></div>
        <div class="mp-proj-block" id="mp-proj-block"></div>
        <div class="mp-ocean">
            <canvas id="mp-ocean-canvas" aria-label="Live mempool transaction ocean"></canvas>
            <div class="mp-ocean-tip" id="mp-ocean-tip" hidden></div>
        </div>
        <div class="mp-depth">
            <div class="mp-depth-head"><span>FEE DEPTH</span><span>piconero/byte · bytes</span></div>
            <canvas id="mp-depth-canvas" aria-label="Fee depth chart"></canvas>
        </div>
        <div class="mp-txfeed" id="mp-txfeed"></div>
        <div class="mp-stats-row" id="mp-stats-row"></div>
    </section>

    <!-- EXPLORER placeholder (filled in M3) ───────────────────────── -->
    <section class="mp-mode-panel" id="mp-panel-explorer" data-mode="explorer" role="tabpanel" hidden>
        <div class="mp-placeholder">Explorer mode — coming in M3</div>
    </section>

    <!-- MINING placeholder (filled in M4) ─────────────────────────── -->
    <section class="mp-mode-panel" id="mp-panel-mining" data-mode="mining" role="tabpanel" hidden>
        <div class="mp-placeholder">Mining mode — coming in M4</div>
    </section>

</div>

<!-- Shared services -->
<script src="js/nav.js"></script>
<script src="js/price-service.js"></script>
<script src="js/monero-network.js"></script>
<script src="js/genui.js"></script>

<!-- M2 modules -->
<script src="js/xmr-relay-ws.js"></script>
<script src="js/mempool-ocean-stats.js"></script>
<script src="js/mempool-ocean-feed.js"></script>
<script src="js/mempool-ocean-hero.js"></script>
<script src="js/mempool-ocean-projected.js"></script>
<script src="js/mempool-ocean-depth.js"></script>
<script src="js/mempool-ocean-viz.js"></script>
<script src="js/mempool-ocean.js"></script>

<script>
/* ═══ Boot ═══ */
(function () {
    'use strict';

    // Nav + global price service.
    NavComponent.inject('nav-mount');
    if (window.PriceService && typeof PriceService.start === 'function') PriceService.start();

    /* ── Mode switcher (OCEAN / EXPLORER / MINING) ── */
    var VALID = { ocean: 1, explorer: 1, mining: 1 };
    var STORAGE_KEY = 'mempool-mode';

    function setMode(mode) {
        if (!VALID[mode]) mode = 'ocean';
        try { localStorage.setItem(STORAGE_KEY, mode); } catch (_) {}

        var panels = document.querySelectorAll('.mp-mode-panel[data-mode]');
        for (var i = 0; i < panels.length; i++) {
            panels[i].hidden = panels[i].getAttribute('data-mode') !== mode;
        }
        var btns = document.querySelectorAll('.mp-mode-btn[data-mode]');
        for (var j = 0; j < btns.length; j++) {
            var on = btns[j].getAttribute('data-mode') === mode;
            btns[j].classList.toggle('active', on);
            btns[j].setAttribute('aria-selected', on ? 'true' : 'false');
        }

        // RAF discipline: pause ocean when not visible, resume when back.
        if (window.MempoolOcean) {
            if (mode === 'ocean') MempoolOcean.resume();
            else MempoolOcean.pause();
        }
    }

    // Buttons
    var btns = document.querySelectorAll('.mp-mode-btn[data-mode]');
    for (var i = 0; i < btns.length; i++) {
        (function (btn) {
            btn.addEventListener('click', function () {
                setMode(btn.getAttribute('data-mode'));
            });
        })(btns[i]);
    }

    // Initial mode — default ocean; migrate legacy values (market/track) away.
    var initial = 'ocean';
    try {
        var stored = localStorage.getItem(STORAGE_KEY);
        if (stored && VALID[stored]) initial = stored;
    } catch (_) {}
    setMode(initial);

    /* ── Boot the OCEAN orchestrator ── */
    try {
        MempoolOcean.init({ debug: false });
    } catch (e) {
        console.error('[mempool.html] MempoolOcean init failed', e);
    }

    /* ── GenUI ?tx= prefill (M2: just log; M3 will route to EXPLORER) ── */
    try {
        var params = new URLSearchParams(window.location.search);
        var tx = params.get('tx');
        if (tx && /^[0-9a-fA-F]{64}$/.test(tx)) {
            console.log('[mempool.html] prefill txid:', tx);
            /* M3 will switch to EXPLORER mode and render the tx detail here. */
        }
    } catch (_) {}
})();
</script>
</body>
</html>
