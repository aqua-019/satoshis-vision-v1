<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xmr.irish — Hold Monero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Playfair+Display:wght@400;500;600&family=DM+Mono:wght@300;400;500&family=Geologica:wght@100..900&family=Sora:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/d09.css">
    <style>





        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--g8);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }













        /* Hero Section */
        .hero {
            padding: 10rem 2rem 4rem;
            text-align: center;
            background: radial-gradient(ellipse at top, rgba(255, 102, 0, 0.1) 0%, transparent 50%);
        }

        .hero-eyebrow {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--xmr);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
        }

        .hero-title {
            font-family: var(--font-headline);
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        .hero-title .gradient {
            background: linear-gradient(135deg, var(--btc), var(--xmr));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--g4);
            max-width: 700px;
            margin: 0 auto 2rem;
            line-height: 1.8;
        }

        /* Warning Banner */
        .warning-banner {
            background: linear-gradient(135deg, rgba(255, 71, 87, 0.15), rgba(255, 217, 61, 0.1));
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            max-width: 900px;
            margin: 0 auto 3rem;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .warning-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .warning-text {
            font-size: 0.9rem;
            color: var(--g4);
            line-height: 1.6;
        }

        .warning-text strong {
            color: var(--danger-red);
        }

        /* Portal Tabs */
        .portal-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            padding: 0 1rem;
        }

        .portal-tab {
            padding: 1rem 2rem;
            background: var(--g9);
            border: 2px solid var(--g8);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--g4);
        }

        .portal-tab:hover {
            border-color: var(--xmr);
            background: var(--card-hover);
        }

        .portal-tab.active {
            border-color: var(--xmr);
            background: rgba(255, 102, 0, 0.1);
            color: var(--g1);
        }

        .portal-tab .tab-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .portal-tab .changenow-icon {
            background: var(--changenow-green);
            color: white;
        }

        .portal-tab .wagyu-icon {
            background: linear-gradient(135deg, var(--wagyu-pink), #FF1493);
            color: white;
        }

        /* Portal Container */
        .portal-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        .portal-section {
            display: none;
        }

        .portal-section.active {
            display: block;
        }

        /* Widget Container */
        .widget-container {
            background: var(--g9);
            border: 1px solid var(--g8);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .widget-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .widget-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .widget-title h2 {
            font-family: var(--font-headline);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .widget-badge {
            background: rgba(0, 194, 111, 0.2);
            color: var(--changenow-green);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .widget-badge.wagyu {
            background: rgba(255, 105, 180, 0.2);
            color: var(--wagyu-pink);
        }

        .widget-stats {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .widget-stat {
            text-align: right;
        }

        .widget-stat-value {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            color: var(--g1);
        }

        .widget-stat-label {
            font-size: 0.75rem;
            color: var(--g4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Iframe Container */
        .iframe-wrapper {
            background: #0a0a0a;
            border-radius: 12px;
            overflow: hidden;
            min-height: 370px;
            max-width: 480px;
            margin: 0 auto;
            border: 1px solid var(--g8);
        }

        .iframe-wrapper iframe {
            width: 100%;
            height: 370px;
            border: none;
            display: block;
        }

        /* Wagyu Section */
        .wagyu-portal {
            text-align: center;
        }

        .geo-warning {
            background: linear-gradient(135deg, rgba(255, 71, 87, 0.2), rgba(255, 71, 87, 0.05));
            border: 1px solid rgba(255, 71, 87, 0.4);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .geo-warning h3 {
            color: var(--danger-red);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .geo-warning p {
            color: var(--g4);
            font-size: 0.9rem;
        }

        .wagyu-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .wagyu-feature {
            background: var(--g9);
            border: 1px solid var(--g8);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: left;
        }

        .wagyu-feature h4 {
            color: var(--wagyu-pink);
            font-size: 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .wagyu-feature p {
            color: var(--g4);
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .portal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .portal-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .portal-btn.primary {
            background: linear-gradient(135deg, var(--wagyu-pink), #FF1493);
            color: white;
        }

        .portal-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
        }

        .portal-btn.secondary {
            background: var(--g9);
            border: 2px solid var(--wagyu-pink);
            color: var(--wagyu-pink);
        }

        .portal-btn.secondary:hover {
            background: rgba(255, 105, 180, 0.1);
        }

        /* Info Section */
        .info-section {
            max-width: 1000px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .info-card {
            background: var(--g9);
            border: 1px solid var(--g8);
            border-radius: 16px;
            padding: 2rem;
        }

        .info-card h3 {
            font-family: var(--font-headline);
            font-size: 1.3rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .info-card h3 .icon {
            font-size: 1.5rem;
        }

        .info-card p {
            color: var(--g4);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 1rem;
        }

        .info-card ul {
            list-style: none;
            padding: 0;
        }

        .info-card li {
            color: var(--g4);
            font-size: 0.9rem;
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
        }

        .info-card li::before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--xmr);
        }

        /* Comparison Table */
        .comparison-section {
            max-width: 1000px;
            margin: 0 auto 4rem;
            padding: 0 2rem;
        }

        .comparison-section h2 {
            font-family: var(--font-headline);
            font-size: 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .comparison-table {
            background: var(--g9);
            border: 1px solid var(--g8);
            border-radius: 16px;
            overflow: hidden;
        }

        .comparison-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .comparison-table th,
        .comparison-table td {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--g8);
        }

        .comparison-table th {
            background: var(--g8);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .comparison-table tr:last-child td {
            border-bottom: none;
        }

        .comparison-table td {
            font-size: 0.95rem;
            color: var(--g4);
        }

        .comparison-table .feature-name {
            color: var(--g1);
            font-weight: 500;
        }

        .comparison-table .check {
            color: var(--success-green);
        }

        .comparison-table .cross {
            color: var(--danger-red);
        }

        /* Education Section */
        .education-section {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .education-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .education-eyebrow {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--xmr);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.75rem;
        }

        .education-header h2 {
            font-family: var(--font-headline);
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .education-header p {
            color: var(--g4);
            max-width: 600px;
            margin: 0 auto;
        }

        .infographic-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .infographic-card {
            background: var(--g9);
            border: 1px solid var(--g8);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .infographic-card.full-width,
        .infographic-card.highlight {
            grid-column: 1 / -1;
        }

        .infographic-card.highlight {
            border-color: var(--wagyu-pink);
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.05), transparent);
        }

        .infographic-card h3 {
            font-family: var(--font-headline);
            font-size: 1.2rem;
            margin-bottom: 1.25rem;
            text-align: center;
            color: var(--g1);
        }

        /* Options Comparison */
        .options-comparison {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .option-box {
            flex: 1;
            background: var(--bg);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .option-header {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .option-header.danger {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger-red);
        }

        .option-header.success {
            background: rgba(0, 211, 149, 0.2);
            color: var(--success-green);
        }

        .option-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .option-risk {
            font-size: 0.8rem;
            color: var(--g4);
        }

        .stat-highlight {
            text-align: center;
            margin-bottom: 1rem;
        }

        .stat-value {
            font-family: var(--font-mono);
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-value.orange {
            color: var(--xmr);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--g4);
        }

        .infographic-note {
            font-size: 0.8rem;
            color: var(--g4);
            text-align: center;
            line-height: 1.5;
        }

        /* Flow Diagram */
        .flow-diagram {
            margin-bottom: 1.5rem;
        }

        .flow-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .flow-row.secondary {
            opacity: 0.85;
        }

        .flow-box {
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            text-align: center;
            min-width: 90px;
        }

        .flow-box.btc {
            background: rgba(247, 147, 26, 0.2);
            border: 1px solid var(--btc);
            color: var(--btc);
        }

        .flow-box.xmr {
            background: rgba(255, 102, 0, 0.2);
            border: 1px solid var(--xmr);
            color: var(--xmr);
        }

        .flow-box.swap {
            background: rgba(74, 144, 217, 0.2);
            border: 1px solid var(--tradfi-blue);
            color: var(--tradfi-blue);
        }

        .flow-box.fee {
            background: rgba(255, 102, 0, 0.15);
            border: 1px solid var(--xmr);
            color: var(--xmr);
        }

        .flow-box.stable {
            background: var(--g8);
            border: 1px solid var(--g4);
            color: var(--g4);
        }

        .flow-box.fiat {
            background: rgba(0, 211, 149, 0.15);
            border: 1px solid var(--success-green);
            color: var(--success-green);
        }

        .flow-arrow {
            color: var(--g4);
            font-size: 1rem;
        }

        .flow-fee {
            text-align: center;
            margin: 0.75rem 0;
        }

        .fee-arrow {
            color: var(--xmr);
            font-size: 1.25rem;
        }

        .fee-text {
            font-size: 0.75rem;
            color: var(--xmr);
        }

        .impact-box {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }

        .impact-title {
            font-weight: 700;
            color: var(--danger-red);
            margin-bottom: 0.25rem;
        }

        .impact-text {
            font-size: 0.9rem;
            color: var(--g1);
        }

        .impact-subtext {
            font-size: 0.75rem;
            color: var(--g4);
        }

        /* Spiral Visual */
        .spiral-visual {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .spiral-stage {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--bg);
            border-radius: 12px;
            padding: 1rem;
            min-width: 180px;
        }

        .stage-number {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--xmr), var(--danger-red));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .stage-content {
            flex: 1;
        }

        .stage-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .stage-desc {
            font-size: 0.75rem;
            color: var(--g4);
            line-height: 1.4;
        }

        .spiral-connector {
            color: var(--xmr);
            font-size: 1.25rem;
            font-weight: 700;
        }

        .cycle-note {
            background: var(--g8);
            border-radius: 8px;
            padding: 1rem;
            font-size: 0.85rem;
            color: var(--g4);
            text-align: center;
        }

        .cycle-note strong {
            color: var(--g1);
        }

        /* Alternative Visual */
        .alternative-visual {
            margin-bottom: 1.5rem;
        }

        .alt-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg);
            border-radius: 12px;
            margin-bottom: 0.75rem;
        }

        .alt-label {
            font-weight: 600;
            font-size: 0.85rem;
            min-width: 140px;
            color: var(--g4);
        }

        .alt-flow {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            flex: 1;
        }

        .alt-item {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            background: var(--g8);
            font-weight: 500;
        }

        .alt-item.danger {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger-red);
            font-weight: 600;
        }

        .alt-item.success {
            background: rgba(0, 211, 149, 0.2);
            color: var(--success-green);
            font-weight: 600;
        }

        .alt-arrow {
            color: var(--g4);
            font-size: 1.1rem;
        }

        .alt-divider {
            text-align: center;
            font-weight: 700;
            color: var(--wagyu-pink);
            font-size: 1rem;
            margin: 1rem 0;
            padding: 0.5rem;
            background: rgba(255, 105, 180, 0.1);
            border-radius: 8px;
        }

        .alt-explanation {
            font-size: 0.9rem;
            color: var(--g4);
            line-height: 1.7;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .alt-explanation p {
            margin-bottom: 1rem;
        }

        .alt-explanation .caveat {
            background: rgba(0, 211, 149, 0.1);
            border: 1px solid rgba(0, 211, 149, 0.3);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-top: 1.5rem;
            text-align: center;
        }

        .education-disclaimer {
            margin-top: 2rem;
            background: var(--g8);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .education-disclaimer p {
            font-size: 0.9rem;
            color: var(--g4);
            line-height: 1.6;
        }

        .education-disclaimer strong {
            color: var(--warning-yellow);
        }

        /* Market Dashboard */
        .market-dashboard {
            margin-top: 1.5rem;
            padding: 1.25rem;
            background: var(--g9);
            border: 1px solid var(--g8);
            border-radius: 10px;
        }

        .market-dashboard h4 {
            margin-bottom: 1rem;
            color: var(--g1);
            font-size: 0.95rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }

        .metric-card {
            background: var(--bg);
            border: 1px solid var(--g8);
            border-radius: 8px;
            padding: 0.85rem;
            text-align: center;
        }

        .metric-card .metric-value {
            font-family: var(--font-mono);
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--g1);
            margin-bottom: 0.25rem;
        }

        .metric-card .metric-label {
            font-family: var(--font-body);
            font-size: 0.7rem;
            color: var(--g4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-card .metric-value.positive {
            color: var(--success-green);
        }

        .metric-card .metric-value.negative {
            color: var(--danger-red);
        }

        .network-stats-title {
            margin-top: 1rem;
            margin-bottom: 0.75rem;
            font-size: 0.8rem;
            color: var(--g4);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .network-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }

        .network-card {
            background: var(--bg);
            border: 1px solid var(--g8);
            border-radius: 8px;
            padding: 0.75rem 0.5rem;
            text-align: center;
        }

        .network-card .metric-value {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--xmr);
            margin-bottom: 0.2rem;
        }

        .network-card .metric-label {
            font-family: var(--font-body);
            font-size: 0.65rem;
            color: var(--g4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

<div class="page-offset" style="position:relative;overflow:hidden;min-height:100vh;">
    <canvas id="constellation" class="constellation"></canvas>
    <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
    <div class="z1">
        <div id="nav-mount"></div>



        <div class="footer">
            <span>xmr.irish / hold-xmr / GenUI-native</span>
            <div><a href="index.html">Home</a><a href="btc-xmr-education.html">Education</a><a href="markets.html">Markets</a><a href="hold-monero.html">Hold XMR</a><a href="mining.html">Mine XMR</a><a href="community.html">Community</a></div>
            <span>changenow.io</span>
        </div>

</div>
<script>
        // Mobile menu toggle
        function toggleMenu() {
            document.getElementById('mobileMenu').classList.toggle('active');
        }

        // Portal switching
        function switchPortal(portal) {
            document.querySelectorAll('.portal-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            document.querySelectorAll('.portal-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(portal + '-section').classList.add('active');
        }

        // ── Optimized Widget Loader ──────────────────────────────
        // Lazy-loads iframes only when their section becomes visible
        const WidgetLoader = {
            loaded: new Set(),

            init() {
                // Observe portal sections for visibility
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            this.activateWidgets(entry.target);
                        }
                    });
                }, { rootMargin: '200px' });

                document.querySelectorAll('.portal-section').forEach(section => {
                    observer.observe(section);
                });
            },

            activateWidgets(section) {
                section.querySelectorAll('iframe[data-src]').forEach(iframe => {
                    if (!this.loaded.has(iframe.id)) {
                        iframe.src = iframe.dataset.src;
                        this.loaded.add(iframe.id);
                    }
                });
            }
        };

        // ── ChangeNOW Swap Status Tracker ────────────────────────
        // Users can paste a ChangeNOW transaction ID to check status
        // Uses ChangeNOW public exchange status endpoint (no API key needed)
        const SwapTracker = {
            container: null,

            init() {
                this.container = document.getElementById('swap-tracker-result');
            },

            async checkStatus(txId) {
                if (!txId || !this.container) return;
                this.container.innerHTML = '<p style="color: var(--g4);">Checking swap status...</p>';
                this.container.style.display = 'block';

                try {
                    const resp = await fetch(`https://changenow.io/api/v1/transactions/${txId}/`);
                    if (!resp.ok) throw new Error('Transaction not found');
                    const tx = await resp.json();

                    const statusColors = {
                        waiting: '#FFD93D', confirming: '#FFD93D', exchanging: '#FF6600',
                        sending: '#00D395', finished: '#00D395', failed: '#FF4757',
                        refunded: '#4A90D9', expired: '#FF4757'
                    };
                    const color = statusColors[tx.status] || '#A0A0A0';

                    this.container.innerHTML = `
                        <div style="padding: 1rem; background: #1a1a1a; border-radius: 8px; border-left: 3px solid ${color};">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                                <strong style="color: ${color}; text-transform: uppercase;">${tx.status}</strong>
                                <span style="font-family: var(--font-mono); font-size: 0.8rem; color: var(--g4);">${tx.id}</span>
                            </div>
                            ${tx.amountFrom ? `<p style="font-size: 0.85rem;">Sending: ${tx.amountFrom} ${(tx.fromCurrency || '').toUpperCase()}</p>` : ''}
                            ${tx.amountTo ? `<p style="font-size: 0.85rem;">Receiving: ~${tx.amountTo} ${(tx.toCurrency || '').toUpperCase()}</p>` : ''}
                            <p style="font-size: 0.8rem; margin-top: 0.5rem; color: var(--g4);">
                                Need help? <a href="https://support.changenow.io/" target="_blank" rel="noopener" style="color: var(--changenow-green);">ChangeNOW Support</a>
                            </p>
                        </div>`;
                } catch (err) {
                    this.container.innerHTML = `
                        <p style="color: var(--danger-red); padding: 0.75rem; background: rgba(255,71,87,0.1); border-radius: 8px;">
                            Could not find transaction. Double-check the ID or visit
                            <a href="https://changenow.io/exchange/txs" target="_blank" rel="noopener" style="color: var(--changenow-green);">changenow.io/exchange/txs</a>
                        </p>`;
                }
            }
        };

        // ── Market Dashboard ──────────────────────────────────────
        // Shows live market metrics: prices, 24h change, market cap, supply
        const MarketDashboard = {
            INTERVAL: 1800000, // 30 minutes

            formatUsd(n) {
                if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
                if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
                if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
                return '$' + n.toLocaleString(undefined, { maximumFractionDigits: 2 });
            },

            formatSupply(n) {
                if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
                return n.toLocaleString(undefined, { maximumFractionDigits: 0 });
            },

            setText(id, text) {
                const el = document.getElementById(id);
                if (el) el.textContent = text;
            },

            setClass(id, cls) {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.remove('positive', 'negative');
                    if (cls) el.classList.add(cls);
                }
            },

            async fetch() {
                try {
                    const [priceResp, coinResp] = await Promise.all([
                        fetch('https://api.coingecko.com/api/v3/simple/price?ids=monero,bitcoin&vs_currencies=usd&include_24hr_change=true&include_market_cap=true'),
                        fetch('https://api.coingecko.com/api/v3/coins/monero?localization=false&tickers=false&community_data=false&developer_data=false')
                    ]);
                    const priceData = await priceResp.json();
                    const coinData = await coinResp.json();

                    const btcUsd = priceData.bitcoin.usd;
                    const xmrUsd = priceData.monero.usd;
                    const xmr24h = priceData.monero.usd_24h_change;
                    const xmrMcap = priceData.monero.usd_market_cap;
                    const ratio = (btcUsd / xmrUsd).toFixed(1);
                    const supply = coinData.market_data && coinData.market_data.circulating_supply;

                    this.setText('dash-btc-usd', this.formatUsd(btcUsd));
                    this.setText('dash-xmr-usd', this.formatUsd(xmrUsd));
                    this.setText('dash-btc-xmr', ratio);
                    this.setText('dash-xmr-mcap', this.formatUsd(xmrMcap));

                    if (typeof xmr24h === 'number') {
                        const sign = xmr24h >= 0 ? '+' : '';
                        this.setText('dash-xmr-24h', sign + xmr24h.toFixed(2) + '%');
                        this.setClass('dash-xmr-24h', xmr24h >= 0 ? 'positive' : 'negative');
                    }

                    if (supply) {
                        this.setText('dash-xmr-supply', this.formatSupply(supply));
                    }
                } catch (e) {
                    // silently fail — dashboard is supplementary
                }
            },

            start() {
                this.fetch();
                setInterval(() => this.fetch(), this.INTERVAL);
            }
        };

        // ── Live Rate Display ────────────────────────────────────
        // Shows current BTC→XMR rate on the swap page (30-min refresh)
        const LiveRate = {
            INTERVAL: 1800000,

            async fetch() {
                try {
                    const resp = await fetch(
                        'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,monero&vs_currencies=usd&include_24hr_change=true'
                    );
                    const data = await resp.json();
                    const btcUsd = data.bitcoin.usd;
                    const xmrUsd = data.monero.usd;
                    const ratio = (btcUsd / xmrUsd).toFixed(1);

                    const el = document.getElementById('live-swap-rate');
                    if (el) {
                        el.textContent = `1 BTC ≈ ${ratio} XMR`;
                        el.title = `BTC: $${btcUsd.toLocaleString()} | XMR: $${xmrUsd.toLocaleString()}`;
                    }
                } catch (e) {
                    // silently fail — rate display is supplementary
                }
            },

            start() {
                this.fetch();
                setInterval(() => this.fetch(), this.INTERVAL);
            }
        };

        // ── Init ─────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            WidgetLoader.init();
            SwapTracker.init();
            LiveRate.start();
            MarketDashboard.start();
        });

        // Close mobile menu when clicking outside
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobileMenu');
            const hamburger = document.querySelector('.hamburger');
            if (!menu.contains(e.target) && !hamburger.contains(e.target)) {
                menu.classList.remove('active');
            }
        });
    </script>
