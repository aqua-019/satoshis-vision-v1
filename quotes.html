<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satoshi Quote Archive — The Privacy Evolution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Playfair+Display:wght@400;500;600&family=DM+Mono:wght@300;400;500&family=Geologica:wght@100..900&family=Sora:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/d09.css">
    <style>
        /* Hero */
        .hero {
            padding: 2rem 2rem 3rem;
            text-align: center;
        }

        .hero-eyebrow {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--btc);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
        }

        .hero-title {
            font-family: var(--font-headline);
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 400;
            letter-spacing: -1.5px;
            margin-bottom: 1rem;
        }

        .hero-subtitle {
            color: var(--g4);
            font-family: var(--font-body);
            font-size: 14px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Controls */
        .controls {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: center;
            background: var(--g10);
            border: 1px solid var(--g9);
            border-radius: 14px;
            position: sticky;
            top: 52px;
            z-index: 100;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            max-width: 400px;
            padding: 0.8rem 1rem;
            background: var(--bg);
            border: 1px solid var(--g8);
            border-radius: 12px;
            color: var(--g1);
            font-family: var(--font-subhead);
            font-style: italic;
            font-size: 13px;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--xmr);
        }

        .search-input::placeholder {
            color: var(--g7);
            font-family: var(--font-subhead);
            font-style: italic;
        }

        .filter-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--g8);
            background: transparent;
            color: var(--g5);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            border-color: var(--g6);
            color: var(--g3);
        }

        .filter-btn.active {
            border-color: rgba(255,102,0,0.3);
            color: var(--xmr);
            background: rgba(255,102,0,0.06);
        }

        .filter-btn.highlight-btn.active {
            border-color: rgba(255,215,0,0.3);
            background: rgba(255,215,0,0.08);
            color: var(--gold);
        }

        .stats {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--g5);
            width: 100%;
            text-align: center;
            margin-top: 0.5rem;
        }

        /* Quote Grid */
        .quote-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        /* Quote Card */
        .quote-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 1.5rem;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .quote-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.6s;
            pointer-events: none;
        }

        .quote-card:hover {
            border-color: var(--card-hover);
            border-radius: 18px;
        }

        .quote-card:hover::before {
            opacity: 1;
            animation: orange-pulse 2.5s ease-in-out infinite;
        }

        @keyframes orange-pulse {
            0%, 100% { background: rgba(255,102,0,0.03); }
            50% { background: rgba(255,102,0,0.08); }
        }

        .quote-card.key-quote {
            border-color: rgba(255, 215, 0, 0.12);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.03), transparent);
        }

        .quote-card.privacy {
            border-color: rgba(255, 102, 0, 0.12);
        }

        .quote-card.hidden {
            display: none;
        }

        .quote-text {
            font-family: var(--font-subhead);
            font-size: 1rem;
            font-style: italic;
            line-height: 1.7;
            flex: 1;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .quote-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.03);
            position: relative;
            z-index: 1;
        }

        .quote-source {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--g7);
        }

        .quote-link {
            color: var(--btc);
            text-decoration: none;
        }

        .quote-link:hover {
            text-decoration: underline;
        }

        .quote-date {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--g7);
        }

        .quote-tag {
            padding: 0.2rem 0.6rem;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            position: relative;
            z-index: 1;
        }

        .quote-tag.privacy {
            background: rgba(255, 102, 0, 0.2);
            color: var(--xmr);
        }

        .quote-tag.philosophy {
            background: rgba(247, 147, 26, 0.2);
            color: var(--btc);
        }

        .quote-tag.technical {
            background: rgba(100, 100, 255, 0.2);
            color: #8888FF;
        }

        .quote-tag.economics {
            background: rgba(0, 200, 100, 0.2);
            color: #00D26A;
        }

        .quote-tag.security {
            background: rgba(255, 71, 87, 0.2);
            color: #FF4757;
        }

        .quote-tag.farewell {
            background: rgba(255, 215, 0, 0.2);
            color: var(--gold);
        }

        .key-badge {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            background: var(--gold);
            color: var(--bg);
            border-radius: 4px;
            z-index: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .quote-grid {
                grid-template-columns: 1fr;
                padding: 1rem;
            }

            .controls {
                padding: 1rem;
                top: 52px;
            }
        }
    </style>
</head>
<body>
    <div class="page-offset" style="position:relative;overflow:hidden;min-height:100vh;">
        <canvas id="constellation" class="constellation"></canvas>
        <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
        <div class="z1">
            <div id="nav-mount"></div>

            <!-- Hero -->
            <section class="hero">
                <div class="hero-eyebrow">Complete Archive</div>
                <h1 class="hero-title">Satoshi Quote Collection</h1>
                <p class="hero-subtitle">
                    30+ quotes searchable by category. Weighted toward privacy discussions and Monero-predictive language.
                </p>
            </section>

            <!-- Controls -->
            <div class="controls">
                <input type="text" class="search-input" id="searchInput" placeholder="Search quotes...">
                <button class="filter-btn active" onclick="filterQuotes('all')">All</button>
                <button class="filter-btn" onclick="filterQuotes('privacy')">Privacy</button>
                <button class="filter-btn" onclick="filterQuotes('philosophy')">Philosophy</button>
                <button class="filter-btn" onclick="filterQuotes('technical')">Technical</button>
                <button class="filter-btn" onclick="filterQuotes('economics')">Economics</button>
                <button class="filter-btn" onclick="filterQuotes('farewell')">Farewell</button>
                <button class="filter-btn highlight-btn" id="keyQuotesBtn" onclick="toggleKeyQuotes()">★ Key Quotes</button>
                <button class="filter-btn" onclick="randomQuote()">🎲 Random</button>
                <div class="stats" id="stats">Showing 30 quotes</div>
            </div>

            <!-- Quote Grid -->
            <div class="quote-grid" id="quoteGrid">
                <!-- Quotes inserted by JavaScript -->
            </div>

            <!-- Footer -->
            <div class="footer">
                <span>xmr.irish / quotes</span>
                <div><a href="index.html">Home</a><a href="btc-xmr-education.html">Education</a><a href="markets.html">Markets</a><a href="hold-monero.html">Hold XMR</a><a href="mining.html">Mine XMR</a><a href="community.html">Community</a></div>
                <span>satoshi.nakamotoinstitute.org</span>
            </div>
        </div>
    </div>

    <script>
        const quotes = [
            // PRIVACY - Most Important (Key Quotes)
            {
                text: "What we need is a way to generate additional blinded variations of a public key. The blinded variations would have the same properties as a public key and could be used to receive payments. Others could not tell the blinded public keys belong to the owner of the original public key.",
                source: "BitcoinTalk Thread #174",
                date: "August 11, 2010",
                tag: "privacy",
                key: true,
                link: "https://satoshi.nakamotoinstitute.org/posts/bitcointalk/threads/174/"
            },
            {
                text: "With group signatures, it is possible for something to be signed but not know who signed it.",
                source: "BitcoinTalk Thread #174",
                date: "August 11, 2010",
                tag: "privacy",
                key: true,
                link: "https://satoshi.nakamotoinstitute.org/posts/bitcointalk/threads/174/"
            },
            {
                text: "The network would track a bunch of independent outpoints. It doesn't know what transactions or amounts they belong to. A private key could have a counter so you can derive any number of random variations of the public key.",
                source: "BitcoinTalk Thread #174",
                date: "August 11, 2010",
                tag: "privacy",
                key: true,
                link: "https://satoshi.nakamotoinstitute.org/posts/bitcointalk/threads/174/"
            },
            {
                text: "It's hard to think of how to apply zero-knowledge-proofs in this case. We're trying to prove the absence of something, which seems to require knowing all of something and that's a lot.",
                source: "BitcoinTalk Thread #174",
                date: "August 10, 2010",
                tag: "privacy",
                key: true,
                link: "https://satoshi.nakamotoinstitute.org/posts/bitcointalk/threads/174/"
            },
            {
                text: "If we have to hide transaction amounts, we'd need something like David Chaum's approach. Transactions would be split into standard denominations.",
                source: "BitcoinTalk Thread #174",
                date: "August 13, 2010",
                tag: "privacy",
                key: true,
                link: "https://satoshi.nakamotoinstitute.org/posts/bitcointalk/threads/174/"
            },
            {
                text: "For privacy, it's best to use new addresses for each transaction. Your client creates new addresses automatically, but you need to remember to use them.",
                source: "BitcoinTalk Thread #82",
                date: "July 8, 2010",
                tag: "privacy",
                key: false,
                link: "https://satoshi.nakamotoinstitute.org/posts/bitcointalk/threads/82/"
            },
            {
                text: "The possibility of a pseudo-anonymous currency is not on any regulatory radar at this point. When they notice Bitcoin, they'll focus on the normal KYC procedures at the exchange endpoints.",
                source: "BitcoinTalk Thread #82",
                date: "July 8, 2010",
                tag: "privacy",
                key: false,
                link: "https://satoshi.nakamotoinstitute.org/posts/bitcointalk/threads/82/"
            },
            // PHILOSOPHY
            {
                text: "The root problem with conventional currency is all the trust that's required to make it work. The central bank must be trusted not to debase the currency, but the history of fiat currencies is full of breaches of that trust.",
                source: "P2P Foundation",
                date: "February 11, 2009",
                tag: "philosophy",
                key: true
            },
            {
                text: "With e-currency based on cryptographic proof, without the need to trust a third party middleman, money can be secure and transactions effortless.",
                source: "P2P Foundation",
                date: "February 11, 2009",
                tag: "philosophy",
                key: true
            },
            {
                text: "A lot of people automatically dismiss e-currency as a lost cause because of all the companies that failed since the 1990s. I hope it's obvious it was only the centrally controlled nature of those systems that doomed them.",
                source: "P2P Foundation",
                date: "February 11, 2009",
                tag: "philosophy",
                key: false
            },
            {
                text: "If you don't believe me or don't get it, I don't have time to try to convince you, sorry.",
                source: "BitcoinTalk",
                date: "July 29, 2010",
                tag: "philosophy",
                key: false
            },
            {
                text: "It's very attractive to the libertarian viewpoint if we can explain it properly. I'm better with code than with words though.",
                source: "Email to Hal Finney",
                date: "November 2008",
                tag: "philosophy",
                key: false
            },
            {
                text: "I am not Dorian Nakamoto.",
                source: "P2P Foundation (after 5 years of silence)",
                date: "March 7, 2014",
                tag: "philosophy",
                key: false
            },
            {
                text: "The Times 03/Jan/2009 Chancellor on brink of second bailout for banks",
                source: "Genesis Block Coinbase",
                date: "January 3, 2009",
                tag: "philosophy",
                key: true
            },
            // TECHNICAL
            {
                text: "We have proposed a system for electronic transactions without relying on trust.",
                source: "Bitcoin Whitepaper",
                date: "October 31, 2008",
                tag: "technical",
                key: true
            },
            {
                text: "The nature of Bitcoin is such that once version 0.1 was released, the core design was set in stone for the rest of its lifetime.",
                source: "BitcoinTalk",
                date: "June 17, 2010",
                tag: "technical",
                key: false
            },
            {
                text: "As long as a majority of CPU power is controlled by nodes that are not cooperating to attack the network, they'll generate the longest chain and outpace attackers.",
                source: "Bitcoin Whitepaper",
                date: "October 31, 2008",
                tag: "technical",
                key: false
            },
            {
                text: "The Bitcoin network might actually reduce spam by diverting zombie farms to generating bitcoins instead.",
                source: "Cryptography Mailing List",
                date: "November 14, 2008",
                tag: "technical",
                key: false
            },
            {
                text: "SHA-256 is very strong. It's not the same as the stepping from MD5 to SHA1. It can last several decades unless there's some massive breakthrough attack.",
                source: "BitcoinTalk",
                date: "June 14, 2010",
                tag: "technical",
                key: false
            },
            {
                text: "I'm sure that in 20 years there will either be very large transaction volume or no volume.",
                source: "BitcoinTalk",
                date: "February 14, 2010",
                tag: "technical",
                key: false
            },
            // ECONOMICS
            {
                text: "Banks must be trusted to hold our money and transfer it electronically, but they lend it out in waves of credit bubbles with barely a fraction in reserve.",
                source: "P2P Foundation",
                date: "February 11, 2009",
                tag: "economics",
                key: true
            },
            {
                text: "Lost coins only make everyone else's coins worth slightly more. Think of it as a donation to everyone.",
                source: "BitcoinTalk",
                date: "June 21, 2010",
                tag: "economics",
                key: false
            },
            {
                text: "In a few decades when the reward gets too small, the transaction fee will become the main compensation for nodes.",
                source: "BitcoinTalk",
                date: "February 14, 2010",
                tag: "economics",
                key: false
            },
            {
                text: "The price of any commodity tends to gravitate toward the production cost. If the price is below cost, then production slows down. If the price is above cost, profit can be made by generating and selling more.",
                source: "BitcoinTalk",
                date: "February 21, 2010",
                tag: "economics",
                key: false
            },
            {
                text: "It might make sense just to get some in case it catches on. If enough people think the same way, that becomes a self fulfilling prophecy.",
                source: "Cryptography Mailing List",
                date: "January 17, 2009",
                tag: "economics",
                key: false
            },
            // SECURITY
            {
                text: "The software is not at all resistant to DoS attack. This is one improvement, but there are still more ways to attack than I can count.",
                source: "BitcoinTalk",
                date: "December 5, 2010",
                tag: "security",
                key: false
            },
            {
                text: "Imagine someone stole something from you. You can't get it back, but if you could, if it had a kill switch that could be remote triggered, would you do it?",
                source: "BitcoinTalk",
                date: "August 2010",
                tag: "security",
                key: false
            },
            // FAREWELL
            {
                text: "WikiLeaks has kicked the hornet's nest, and the swarm is headed towards us.",
                source: "BitcoinTalk — Final Public Post",
                date: "December 5, 2010",
                tag: "farewell",
                key: true,
                link: "https://satoshi.nakamotoinstitute.org/posts/bitcointalk/threads/241/"
            },
            {
                text: "I've moved on to other things. It's in good hands with Gavin and everyone.",
                source: "Email to Mike Hearn",
                date: "April 23, 2011",
                tag: "farewell",
                key: true
            },
            {
                text: "It would have been nice to get this attention in any other context.",
                source: "BitcoinTalk",
                date: "December 5, 2010",
                tag: "farewell",
                key: false,
                link: "https://satoshi.nakamotoinstitute.org/posts/bitcointalk/threads/241/"
            },
            {
                text: "I make this appeal to WikiLeaks not to try to use Bitcoin. Bitcoin is a small beta community in its infancy. You would not stand to get more than pocket change, and the heat you would bring would likely destroy us at this stage.",
                source: "BitcoinTalk",
                date: "December 5, 2010",
                tag: "farewell",
                key: false,
                link: "https://satoshi.nakamotoinstitute.org/posts/bitcointalk/threads/241/"
            }
        ];

        let currentFilter = 'all';
        let showKeyOnly = false;

        function renderQuotes() {
            const grid = document.getElementById('quoteGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let filtered = quotes.filter(q => {
                const matchesFilter = currentFilter === 'all' || q.tag === currentFilter;
                const matchesSearch = q.text.toLowerCase().includes(searchTerm) ||
                                     q.source.toLowerCase().includes(searchTerm) ||
                                     q.tag.toLowerCase().includes(searchTerm);
                const matchesKey = !showKeyOnly || q.key;
                return matchesFilter && matchesSearch && matchesKey;
            });

            // Sort: key quotes first, then privacy, then by date
            filtered.sort((a, b) => {
                if (a.key !== b.key) return b.key - a.key;
                if (a.tag === 'privacy' && b.tag !== 'privacy') return -1;
                if (b.tag === 'privacy' && a.tag !== 'privacy') return 1;
                return 0;
            });

            grid.innerHTML = filtered.map(q => `
                <div class="quote-card ${q.key ? 'key-quote' : ''} ${q.tag}">
                    ${q.key ? '<span class="key-badge">★ KEY</span>' : ''}
                    <p class="quote-text">"${q.text}"</p>
                    <div class="quote-meta">
                        <div>
                            <span class="quote-source">
                                ${q.link ? `<a href="${q.link}" target="_blank" class="quote-link">${q.source} →</a>` : q.source}
                            </span>
                            <span class="quote-date">${q.date}</span>
                        </div>
                        <span class="quote-tag ${q.tag}">${q.tag}</span>
                    </div>
                </div>
            `).join('');

            document.getElementById('stats').textContent = `Showing ${filtered.length} of ${quotes.length} quotes`;
        }

        function filterQuotes(tag) {
            currentFilter = tag;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (!btn.classList.contains('highlight-btn')) {
                    btn.classList.remove('active');
                }
            });
            event.target.classList.add('active');
            renderQuotes();
        }

        function toggleKeyQuotes() {
            showKeyOnly = !showKeyOnly;
            document.getElementById('keyQuotesBtn').classList.toggle('active', showKeyOnly);
            renderQuotes();
        }

        function randomQuote() {
            const grid = document.getElementById('quoteGrid');
            const cards = grid.querySelectorAll('.quote-card');
            cards.forEach(c => c.style.opacity = '0.3');

            const randomIndex = Math.floor(Math.random() * cards.length);
            cards[randomIndex].style.opacity = '1';
            cards[randomIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });

            setTimeout(() => {
                cards.forEach(c => c.style.opacity = '1');
            }, 2000);
        }

        document.getElementById('searchInput').addEventListener('input', renderQuotes);

        // Initial render
        renderQuotes();
    </script>
    <script src="js/nav.js"></script>
    <script src="js/price-service.js"></script>
    <script src="js/monero-network.js"></script>
    <script src="js/genui.js"></script>
    <script>
    NavComponent.inject('nav-mount');
    PriceService.start();
    MoneroNetwork.start();
    </script>
</body>
</html>
